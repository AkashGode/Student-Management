services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: studentmgmt-sqlserver
    environment:
      SA_PASSWORD: "Admin@12345"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - studentmgmt-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentmgmt-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StudentManagementDB;User Id=sa;Password=Admin@12345;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__SecretKey=StudentMgmt-SuperSecretKey-MinLength32Chars!2024
      - JwtSettings__Issuer=StudentManagementAPI
      - JwtSettings__Audience=StudentManagementClient
      - JwtSettings__ExpiryMinutes=60
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
    networks:
      - studentmgmt-network
    volumes:
      - api_logs:/app/logs
    restart: on-failure

  ui:
    build:
      context: ./student-management-ui
      dockerfile: Dockerfile
    container_name: studentmgmt-ui
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - studentmgmt-network
    restart: on-failure

networks:
  studentmgmt-network:
    driver: bridge

volumes:
  sqlserver_data:
  api_logs: