name: CI/CD - Student Management API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # 🔥 FIX: Build in correct order
      - name: Build Core
        run: dotnet build StudentManagement.Core/StudentManagement.Core.csproj -c Release

      - name: Build Infrastructure
        run: dotnet build StudentManagement.Infrastructure/StudentManagement.Infrastructure.csproj -c Release

      - name: Build API
        run: dotnet build StudentManagement.API/StudentManagement.API.csproj -c Release

      - name: Run unit tests
        run: dotnet test StudentManagement.Tests/StudentManagement.Tests.csproj -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t studentmgmt-api:${{ github.sha }} .

      - name: Verify image
        run: docker images studentmgmt-api